<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIIM Remote</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); max-width: 400px; margin: auto; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; }
        select { background: #333; color: white; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button.secondary { background: #444; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .vol-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .config-panel { display: none; border-top: 1px solid #444; margin-top: 20px; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>WIIM Remote</h2>
    
    <select id="streamerSelect"></select>
    <button class="secondary" onclick="toggleConfig()">⚙️ Gestisci Streamer</button>

    <div id="configPanel" class="config-panel">
        <input type="text" id="newName" placeholder="Nome (es. Salotto)">
        <input type="text" id="newIP" placeholder="IP (es. 192.168.1.50)">
        <button onclick="aggiungiStreamer()">Aggiungi / Aggiorna</button>
        <button class="secondary" onclick="resetLista()" style="background: #6c2d2d;">Reset Lista</button>
    </div>

    <hr>

    <div class="controls">
        <button onclick="comando('setPlayerCmd:resume')">▶ Play</button>
        <button onclick="comando('setPlayerCmd:pause')">⏸ Pause</button>
        <button onclick="comando('setPlayerCmd:prev')">⏮ Prev</button>
        <button onclick="comando('setPlayerCmd:next')">⏭ Next</button>
    </div>

    <h4>Volume</h4>
    <div class="vol-grid">
        <button onclick="comando('setPlayerCmd:vol:10')">10</button>
        <button onclick="comando('setPlayerCmd:vol:30')">30</button>
        <button onclick="comando('setPlayerCmd:vol:50')">50</button>
        <button onclick="comando('setPlayerCmd:vol:70')">70</button>
        <button onclick="comando('setPlayerCmd:vol:90')">90</button>
        <button onclick="comando('setPlayerCmd:mute:1')">🔇</button>
    </div>
</div>

<script>
    // Caricamento iniziale
    let streamers = JSON.parse(localStorage.getItem('mieiStreamers')) || [];
    const select = document.getElementById('streamerSelect');

    function aggiornaUI() {
        if (streamers.length === 0) {
            select.innerHTML = '<option value="">Nessun dispositivo</option>';
        } else {
            select.innerHTML = streamers.map(s => `<option value="${s.ip}">${s.nome} (${s.ip})</option>`).join('');
        }
    }

    function toggleConfig() {
        const panel = document.getElementById('configPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function aggiungiStreamer() {
        const nome = document.getElementById('newName').value;
        const ip = document.getElementById('newIP').value;
        if (nome && ip) {
            streamers.push({ nome, ip });
            localStorage.setItem('mieiStreamers', JSON.stringify(streamers));
            aggiornaUI();
            toggleConfig();
        }
    }

    function resetLista() {
        if(confirm("Cancellare tutti gli streamer salvati?")) {
            localStorage.removeItem('mieiStreamers');
            streamers = [];
            aggiornaUI();
        }
    }

//   async function comando(cmd) {

//           await fetch(url, { mode: 'no-cors' });
//       } catch (e) {
//           console.error("Errore invio:", e);
//       }
//   }
	
	async function comando(cmd) {
		const ip = select.value;
		if (!ip) return;
	
		// Usiamo HTTPS e porta 443 come confermato dal tuo test
		const url = `https://${ip}:443/httpapi.asp?command=${cmd}`;
		
		try {
			// 'no-cors' è vitale qui per ignorare i blocchi di sicurezza sulla risposta
			await fetch(url, { 
				mode: 'no-cors',
				cache: 'no-cache'
			});
			console.log("Comando inviato con successo");
		} catch (e) {
			console.error("Errore di connessione:", e);
		}
	}

    aggiornaUI();
</script>

</body>
</html>
